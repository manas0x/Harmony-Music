name: Harmony Music CI/CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install dependencies
        run: flutter pub get

      - name: Update lang data
        run: dart localization/generator.dart

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/harmonymusic-${VERSION}.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/harmonymusic-${VERSION}-arm64-v8a-release.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/harmonymusic-${VERSION}-armeabi-v7a-release.apk

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/harmonymusic-*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Packages (deb, rpm, AppImage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev \
            libmpv-dev libayatana-appindicator3-dev \
            rpm patchelf wget fuse

      - name: Install AppImageTool
        run: |
          wget -O /usr/local/bin/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Install dependencies
        run: flutter pub get

      - name: Update lang data
        run: dart localization/generator.dart

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build deb package
        run: flutter_distributor package --platform linux --targets deb

      - name: Build rpm package
        run: flutter_distributor package --platform linux --targets rpm

      - name: Build AppImage
        run: flutter_distributor package --platform linux --targets appimage

      - name: Rename Linux packages
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          find dist -name "*.deb" -exec cp {} harmonymusic${VERSION}.deb \;
          find dist -name "*.rpm" -exec cp {} harmonymusic${VERSION}.rpm \;
          find dist -name "*.AppImage" -exec cp {} harmonymusic${VERSION}.AppImage \;

      - name: Upload Linux Packages to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            harmonymusic*.deb
            harmonymusic*.rpm
            harmonymusic*.AppImage
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Install dependencies
        run: flutter pub get

      - name: Update lang data
        run: dart localization/generator.dart

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build Windows exe
        run: flutter_distributor package --platform windows --targets exe

      - name: Rename exe
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName "harmonymusic${version}.exe"

      - name: Upload Windows exe to Release
        uses: softprops/action-gh-release@v1
        with:
          files: harmonymusic*.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
