name: Harmony Music CI/CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (Universal)
        run: flutter build apk --release

      - name: Build APK (arm64-v8a)
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Build APK (armeabi-v7a)
        run: flutter build apk --release --target-platform android-arm --split-per-abi

      - name: Rename APKs
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/harmonymusic-${TAG}.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/harmonymusic-${TAG}-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/harmonymusic-${TAG}-armeabi-v7a.apk

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/harmonymusic-*.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev \
            libmpv-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Zip Linux build
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cd build/linux/x64/release/bundle
          zip -r ../../../../../harmonymusic-${TAG}-linux.zip .

      - name: Upload Linux to Release
        uses: softprops/action-gh-release@v1
        with:
          files: harmonymusic-*-linux.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        run: |
          $tag = "${{ github.ref_name }}"
          compress-archive -Path build\windows\x64\runner\release\* -DestinationPath "harmonymusic-$tag-windows.zip"

      - name: Upload Windows to Release
        uses: softprops/action-gh-release@v1
        with:
          files: harmonymusic-*-windows.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
