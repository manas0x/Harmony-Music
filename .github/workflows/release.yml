name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v2.0.0

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.x'

      - name: Install dependencies
        run: flutter pub get

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev libmpv-dev

      # Build Android
      - name: Build APK
        if: matrix.os == 'ubuntu-latest'
        run: flutter build apk --release

      # Build Linux
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: flutter build linux --release

      # Build Windows
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: flutter build windows --release

      # Prepare artifacts for release
      - name: Zip Linux build
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../HarmonyMusic-Linux.zip .

      - name: Zip Windows build
        if: matrix.os == 'windows-latest'
        run: |
          compress-archive -Path build\windows\x64\runner\release\* -DestinationPath HarmonyMusic-Windows.zip

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            HarmonyMusic-Linux.zip
            HarmonyMusic-Windows.zip
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
