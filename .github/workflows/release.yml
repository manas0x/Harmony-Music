name: Harmony Music CI/CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install dependencies
        run: flutter pub get

      - name: Update lang data
        run: dart localization/generator.dart

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/harmonymusic-${VERSION}.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/harmonymusic-${VERSION}-arm64-v8a-release.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/harmonymusic-${VERSION}-armeabi-v7a-release.apk

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/harmonymusic-*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Packages (deb + zip)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev \
            libmpv-dev libayatana-appindicator3-dev dpkg

      - name: Install dependencies
        run: flutter pub get

      - name: Update lang data
        run: dart localization/generator.dart

      - name: Build Linux
        run: flutter build linux --release

      - name: Create deb package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p .debpkg/usr/lib/harmonymusic
          mkdir -p .debpkg/usr/share/applications
          mkdir -p .debpkg/DEBIAN
          cp -r build/linux/x64/release/bundle/. .debpkg/usr/lib/harmonymusic/
          chmod +x .debpkg/usr/lib/harmonymusic/harmonymusic
          cat > .debpkg/usr/share/applications/harmonymusic.desktop << EOF
          [Desktop Entry]
          Name=Harmony Music
          Exec=/usr/lib/harmonymusic/harmonymusic
          Icon=/usr/lib/harmonymusic/data/flutter_assets/assets/icons/ic_launcher.png
          Type=Application
          Categories=Audio;Music;Player;
          Comment=A cross-platform music streaming app
          EOF
          cat > .debpkg/DEBIAN/control << EOF
          Package: harmonymusic
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: manas0x <https://github.com/manas0x>
          Description: Harmony Music - A cross platform music streaming app
           Stream music from YouTube Music with a beautiful Flutter UI.
          Depends: mpv
          EOF
          dpkg-deb --build .debpkg harmonymusic-${VERSION}.deb

      - name: Zip Linux bundle
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd build/linux/x64/release/bundle
          zip -r ../../../../../harmonymusic-${VERSION}-linux.zip .

      - name: Upload Linux packages to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            harmonymusic-*.deb
            harmonymusic-*-linux.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Install dependencies
        run: flutter pub get

      - name: Update lang data
        run: dart localization/generator.dart

      - name: Activate flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build Windows exe
        run: flutter_distributor package --platform windows --targets exe

      - name: Rename exe
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName "harmonymusic${version}.exe"

      - name: Upload Windows exe to Release
        uses: softprops/action-gh-release@v1
        with:
          files: harmonymusic*.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
